<main>
  <h1>{{ title }}</h1>
  <p class="contador">Pendientes: {{ pendientes() }}</p>

  <div class="nueva-tarea">
    <input
      type="text"
      #inputTarea
      placeholder="Nueva Tarea"
      (keyup.enter)="agregar(inputTarea.value); inputTarea.value = ''"
    />

    <button (click)="agregar(inputTarea.value); inputTarea.value = ''">Agregar</button>
  </div>

  <ul>
    @for (tarea of tareas(); track tarea.id) {
      <li (click)="toggle(tarea.id)" [class.hecha]="tarea.completada">
        {{ tarea.titulo }}
        @if (tarea.completada) {
          <span>Ok</span>
        }
      </li>
    } @empty {
      <li>No hay tareas. Agrega una!!</li>
    }
  </ul>
</main>

<router-outlet />
